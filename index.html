<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:   #22221E;
  --fg:   #FAFAFA;
  --acc:  #FAFAFA;
  --sub:  rgba(250,250,250,0.35);
  --dim:  rgba(250,250,250,0.10);
  --rad:  8px;
}

body {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--fg);
  user-select: none;
  overflow: hidden;
}

/* ─── TOOLBAR ─── */
#toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  position: relative;
  z-index: 50;
}

.tool-btn {
  width: 38px; height: 38px;
  background: transparent;
  border: 1px solid var(--dim);
  border-radius: var(--rad);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.tool-btn:hover  { border-color: var(--sub); background: rgba(250,250,250,0.04); }
.tool-btn.open   { border-color: var(--acc); background: rgba(250,250,250,0.07); }
.tool-btn svg    { width:16px; height:16px; stroke:var(--sub); fill:none; stroke-width:1.6;
                   stroke-linecap:round; stroke-linejoin:round; transition: stroke 0.2s; }
.tool-btn:hover svg, .tool-btn.open svg { stroke: var(--fg); }

/* ─── POPOVERS ─── */
.popover {
  position: absolute;
  top: calc(100% + 8px);
  left: 0;
  background: #2b2b27;
  border: 1px solid rgba(250,250,250,0.09);
  border-radius: 12px;
  padding: 14px;
  z-index: 200;
  opacity: 0;
  transform: translateY(-8px) scale(0.96);
  pointer-events: none;
  transition: opacity 0.16s cubic-bezier(.4,0,.2,1),
              transform 0.16s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 12px 40px rgba(0,0,0,0.55);
}
.popover.visible {
  opacity: 1;
  transform: translateY(0) scale(1);
  pointer-events: all;
}
.pop-label {
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--sub);
  margin-bottom: 10px;
}

/* ─── THEME SWATCHES ─── */
#theme-pop { width: 220px; }
.swatch-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.swatch {
  aspect-ratio: 1;
  border-radius: 7px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease;
  overflow: hidden;
  position: relative;
}
.swatch:hover      { transform: scale(1.1); }
.swatch.active     { border-color: var(--fg); box-shadow: 0 0 0 1px var(--fg); }

/* ─── SHAPE SWATCHES ─── */
#shape-pop { width: 196px; }
.shape-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.sh-sw {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 1px solid var(--dim);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.14s, background 0.14s, transform 0.14s;
  overflow: hidden;
}
.sh-sw:hover  { border-color: var(--sub); transform: scale(1.07); }
.sh-sw.active { border-color: var(--fg); background: rgba(250,250,250,0.06); }

/* ─── MAIN ─── */
#main {
  display: flex;
  gap: 30px;
  align-items: flex-start;
}
#game-wrap { position: relative; border-radius: 6px; overflow: hidden; }
canvas { display: block; }

/* ─── OVERLAY ─── */
#overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 11px;
  background: rgba(34,34,30,0.91);
  z-index: 20;
  transition: opacity 0.25s ease;
}
#ov-title {
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 7px;
  text-transform: uppercase;
  color: var(--fg);
}
#ov-sub {
  font-size: 8px;
  font-weight: 300;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--sub);
}

/* ─── PANEL ─── */
#panel {
  display: flex; flex-direction: column;
  gap: 26px; min-width: 88px; padding-top: 2px;
}
.p-lbl {
  font-size: 8px; font-weight: 400;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--sub); margin-bottom: 4px;
}
.p-val {
  font-size: 21px; font-weight: 500;
  color: var(--fg); opacity: 0.92;
  font-variant-numeric: tabular-nums;
}
.p-keys {
  font-size: 8.5px; font-weight: 300;
  color: var(--sub); line-height: 2.5;
}
.p-keys b { font-weight: 400; color: rgba(250,250,250,0.52); }

@keyframes scoreFlash {
  0%   { color: var(--acc); opacity: 1; }
  100% { color: var(--fg);  opacity: 0.92; }
}
.flash { animation: scoreFlash 0.45s ease-out forwards; }
</style>
</head>
<body>

<div id="toolbar">
  <!-- THEME -->
  <div class="tool-btn" id="theme-btn">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="4"/>
      <circle cx="12" cy="4"  r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="20" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="4"  cy="12" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="20" cy="12" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="6.3"  cy="6.3"  r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="17.7" cy="17.7" r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="17.7" cy="6.3"  r="1.5" fill="currentColor" stroke="none"/>
      <circle cx="6.3"  cy="17.7" r="1.5" fill="currentColor" stroke="none"/>
    </svg>
  </div>
  <div class="popover" id="theme-pop">
    <div class="pop-label">Theme</div>
    <div class="swatch-grid" id="swatch-grid"></div>
  </div>

  <!-- SHAPE -->
  <div class="tool-btn" id="shape-btn">
    <svg viewBox="0 0 24 24">
      <rect x="3"  y="3"  width="7" height="7" rx="1.5"/>
      <rect x="14" y="3"  width="7" height="7" rx="1.5"/>
      <rect x="3"  y="14" width="7" height="7" rx="1.5"/>
      <rect x="14" y="14" width="7" height="7" rx="1.5"/>
    </svg>
  </div>
  <div class="popover" id="shape-pop">
    <div class="pop-label">Shape</div>
    <div class="shape-grid" id="shape-grid"></div>
  </div>
</div>

<div id="main">
  <div id="game-wrap">
    <canvas id="game"></canvas>
    <div id="overlay">
      <div id="ov-title">TETRIS</div>
      <div id="ov-sub">SPACE to start</div>
    </div>
  </div>

  <div id="panel">
    <div><div class="p-lbl">Score</div><div class="p-val" id="score-val">0</div></div>
    <div><div class="p-lbl">Level</div><div class="p-val" id="level-val">1</div></div>
    <div><div class="p-lbl">Lines</div><div class="p-val" id="lines-val">0</div></div>
    <div>
      <div class="p-lbl">Next</div>
      <canvas id="next"></canvas>
    </div>
    <div>
      <div class="p-lbl">Keys</div>
      <div class="p-keys">
        <b>← →</b>&nbsp; Move<br>
        <b>↑</b>&nbsp;&nbsp;&nbsp;&nbsp;Rotate<br>
        <b>↓</b>&nbsp;&nbsp;&nbsp;&nbsp;Soft<br>
        <b>SPC</b>&nbsp; Hard / Start<br>
        <b>P</b>&nbsp;&nbsp;&nbsp;&nbsp;Pause<br>
        <b>R</b>&nbsp;&nbsp;&nbsp;&nbsp;Restart
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// AUDIO MANAGER
// ═══════════════════════════════════════════════════════════
const SoundMgr = {
  sounds: {
    menu: new Audio('assets/Tetris (GB) (17)-menu_sound.wav'),
    move: new Audio('assets/Tetris (GB) (18)-move_piece.wav'),
    rotate: new Audio('assets/Tetris (GB) (19)-rotate_piece.wav'),
    lineClear: new Audio('assets/Tetris (GB) (21)-line_clear.wav'),
    tetris: new Audio('assets/Tetris (GB) (22)-tetris_4_lines.wav'),
    levelUp: new Audio('assets/Tetris (GB) (23)-level_up_jingle (V1.1).wav'),
    gameOver: new Audio('assets/Tetris (GB) (25)-game_over.wav'),
    landed: new Audio('assets/Tetris (GB) (27)-piece_landed.wav'),
  },
  
  play(key) {
    const sound = this.sounds[key];
    if (sound) {
      sound.currentTime = 0;
      sound.play().catch(() => {});
    }
  }
};

// ═══════════════════════════════════════════════════════════
// THEMES  (bg + fg pairs — diagonal swatch shows both)
// ═══════════════════════════════════════════════════════════
const THEMES = [
  { id:'dk',  bg:'#22221E', fg:'#FAFAFA' },
  { id:'lt',  bg:'#FAFAFA', fg:'#22221E' },
  { id:'bdk', bg:'#22221E', fg:'#739FBD' },
  { id:'blt', bg:'#739FBD', fg:'#22221E' },
  { id:'rdk', bg:'#22221E', fg:'#B35C5F' },
  { id:'rlt', bg:'#B35C5F', fg:'#FAFAFA' },
  { id:'odk', bg:'#22221E', fg:'#E88C3E' },
  { id:'olt', bg:'#E88C3E', fg:'#22221E' },
];

// ═══════════════════════════════════════════════════════════
// SHAPE RENDERERS
// ═══════════════════════════════════════════════════════════
const C = 30; // cell px

// Each draw() receives: ctx, cx, cy, sizeKey ('grid'|'placed'|'active'|'ghost'), isGhost
const SHAPES = [
  {
    id:'rounded',
    draw(ctx,cx,cy,k,ghost){
      const s = k==='grid'?4 : k==='active'?21:19;
      const r = k==='grid'?1 : 5;
      if(ghost){ ctx.beginPath(); ctx.roundRect(cx-s/2,cy-s/2,s,s,r); ctx.stroke(); }
      else      { ctx.beginPath(); ctx.roundRect(cx-s/2,cy-s/2,s,s,r); ctx.fill(); }
    }
  },
  {
    id:'circle',
    draw(ctx,cx,cy,k,ghost){
      const r = k==='grid'?2 : k==='active'?10:9;
      if(ghost){ ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.stroke(); }
      else      { ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); }
    }
  },
  {
    id:'square',
    draw(ctx,cx,cy,k,ghost){
      const s = k==='grid'?4 : k==='active'?21:19;
      if(ghost){ ctx.strokeRect(cx-s/2,cy-s/2,s,s); }
      else      { ctx.fillRect(cx-s/2,cy-s/2,s,s); }
    }
  },
  {
    id:'diamond',
    draw(ctx,cx,cy,k,ghost){
      const rw = k==='grid'?2.5 : k==='active'?9.5:8.5;
      const rh = k==='grid'?3.5 : k==='active'?13:11;
      ctx.beginPath();
      ctx.moveTo(cx,cy-rh); ctx.lineTo(cx+rw,cy);
      ctx.lineTo(cx,cy+rh); ctx.lineTo(cx-rw,cy);
      ctx.closePath();
      if(ghost) ctx.stroke(); else ctx.fill();
    }
  },
  {
    id:'cross',
    draw(ctx,cx,cy,k,ghost){
      const arm = k==='grid'?2.5 : k==='active'?10:9;
      const thk = k==='grid'?1.5 : k==='active'?5.5:5;
      if(ghost){
        ctx.beginPath();
        ctx.rect(cx-arm,cy-thk/2,arm*2,thk);
        ctx.rect(cx-thk/2,cy-arm,thk,arm*2);
        ctx.stroke();
      } else {
        ctx.fillRect(cx-arm,cy-thk/2,arm*2,thk);
        ctx.fillRect(cx-thk/2,cy-arm,thk,arm*2);
      }
    }
  },
  {
    id:'hex',
    draw(ctx,cx,cy,k,ghost){
      const r = k==='grid'?2.5 : k==='active'?10:9;
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=Math.PI/180*(60*i-30);
        i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a))
             :ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
      }
      ctx.closePath();
      if(ghost) ctx.stroke(); else ctx.fill();
    }
  },
];

// ═══════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════
const COLS=10, ROWS=20;
const gc=document.getElementById('game'), gx=gc.getContext('2d');
gc.width=COLS*C; gc.height=ROWS*C;
const nc=document.getElementById('next'), nx=nc.getContext('2d');
nc.width=4*C; nc.height=4*C;

// ═══════════════════════════════════════════════════════════
// PIECE DEFS
// ═══════════════════════════════════════════════════════════
const PIECES=[
  {c:[[0,1],[1,1],[2,1],[3,1]],w:4,h:3},
  {c:[[0,0],[1,0],[0,1],[1,1]],w:2,h:2},
  {c:[[1,0],[0,1],[1,1],[2,1]],w:3,h:2},
  {c:[[2,0],[0,1],[1,1],[2,1]],w:3,h:2},
  {c:[[0,0],[0,1],[1,1],[2,1]],w:3,h:2},
  {c:[[1,0],[2,0],[0,1],[1,1]],w:3,h:2},
  {c:[[0,0],[1,0],[1,1],[2,1]],w:3,h:2},
];

// ═══════════════════════════════════════════════════════════
// PHYSICS — per-cell bounce
// ═══════════════════════════════════════════════════════════
const GRAVITY     = 2200;   // px/s²
const RESTITUTION = 0.42;   // energy retained on bounce
const VEL_STOP    = 35;     // px/s below which we settle

// bounceMap: "col,row" → {vy, offsetY, active}
let bounceMap = {};

function launchBounce(col, row) {
  // initial downward velocity proportional to drop height
  const fallHeight = (ROWS - row) * C;
  const vy0 = Math.sqrt(2 * GRAVITY * fallHeight * 0.035);
  bounceMap[`${col},${row}`] = { vy: vy0, offsetY: 0, active: true };
}

function tickBounce(dtS) {
  for(const key of Object.keys(bounceMap)) {
    const b = bounceMap[key];
    if(!b.active) continue;
    b.vy += GRAVITY * dtS;
    b.offsetY += b.vy * dtS;
    if(b.offsetY >= 0) {
      b.offsetY = 0;
      b.vy = -b.vy * RESTITUTION;
      if(Math.abs(b.vy) < VEL_STOP) { b.vy=0; b.active=false; }
    }
  }
}

function clearBounce(col, row) { delete bounceMap[`${col},${row}`]; }
function getBounce(col, row)   { return bounceMap[`${col},${row}`]||null; }

// ═══════════════════════════════════════════════════════════
// LINE CLEAR ANIMATION
// ═══════════════════════════════════════════════════════════
let clearRows=[], clearTimer=0, waitClear=false;
const CLEAR_MS = 220;

// ═══════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════
let board,cur,nxt;
let score=0,level=1,lines=0;
let gameOver=false,paused=false,started=false;
let dropCounter=0,dropInterval=800,lastTime=0;
let T=THEMES[0], S=SHAPES[0];

function mkPiece(){
  const p=PIECES[Math.floor(Math.random()*PIECES.length)];
  return{c:p.c.map(([x,y])=>[x,y]),w:p.w,h:p.h,x:Math.floor((COLS-p.w)/2),y:0};
}
function collides(p,brd,dx=0,dy=0){
  for(const[x,y]of p.c){
    const nx2=p.x+x+dx,ny=p.y+y+dy;
    if(nx2<0||nx2>=COLS||ny>=ROWS)return true;
    if(ny>=0&&brd[ny][nx2])return true;
  }return false;
}
function rotatePiece(p){
  const nc2=p.c.map(([x,y])=>[p.h-1-y,x]);
  let rx=p.x;
  const maxX=Math.max(...nc2.map(([x])=>x)),minX=Math.min(...nc2.map(([x])=>x));
  if(rx+maxX>=COLS)rx=COLS-1-maxX; if(rx+minX<0)rx=-minX;
  return{c:nc2,w:p.h,h:p.w,x:rx,y:p.y};
}
function lockPiece(){
  cur.c.forEach(([x,y])=>{const r=cur.y+y,c=cur.x+x;if(r>=0&&r<ROWS)board[r][c]=1;});
}
function ghostRow(){let g=cur.y;while(!collides(cur,board,0,g-cur.y+1))g++;return g;}
function findFull(){return Array.from({length:ROWS},(_,r)=>r).filter(r=>board[r].every(v=>v));}
function removeFull(){
  const f=findFull().sort((a,b)=>b-a);
  f.forEach(r=>{board.splice(r,1);board.unshift(new Array(COLS).fill(0));});
  return f.length;
}
function updateHUD(flash=false){
  document.getElementById('score-val').textContent=score;
  document.getElementById('level-val').textContent=level;
  document.getElementById('lines-val').textContent=lines;
  if(flash){const el=document.getElementById('score-val');el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function easeOutQ(t){return 1-(1-t)*(1-t);}

function cellDraw(ctx,col,row,kind,alpha=1,offsetY=0){
  const cx=col*C+C/2, cy=row*C+C/2+offsetY;
  ctx.save();
  ctx.globalAlpha=alpha;
  if(kind==='grid'){
    ctx.fillStyle=T.fg;
    ctx.globalAlpha=alpha*0.10;
    S.draw(ctx,cx,cy,'grid',false);
  } else if(kind==='ghost'){
    ctx.strokeStyle=T.fg;
    ctx.lineWidth=1;
    ctx.globalAlpha=alpha*0.30;
    S.draw(ctx,cx,cy,'placed',true);
  } else if(kind==='placed'){
    ctx.fillStyle=T.fg;
    ctx.globalAlpha=alpha*0.88;
    S.draw(ctx,cx,cy,'placed',false);
  } else { // active
    ctx.fillStyle=T.fg;
    ctx.globalAlpha=alpha;
    S.draw(ctx,cx,cy,'active',false);
  }
  ctx.restore();
}

function render(){
  // background
  gx.fillStyle=T.bg; gx.fillRect(0,0,gc.width,gc.height);

  // grid dots
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(!board[r][c]) cellDraw(gx,c,r,'grid');

  // placed blocks
  const clearSet=new Set(clearRows.map(cr=>cr.row));
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(!board[r][c])continue;
      let alpha=1, offsetY=0;
      // line clear fade+shrink
      const cr=clearRows.find(x=>x.row===r);
      if(cr){ alpha=1-easeOutQ(cr.prog); }
      // bounce
      const bb=getBounce(c,r);
      if(bb&&bb.active) offsetY=bb.offsetY;
      cellDraw(gx,c,r,'placed',alpha,offsetY);
    }
  }

  // ghost + active piece
  if(started&&!gameOver&&cur&&!waitClear){
    const gy=ghostRow();
    if(gy!==cur.y){
      cur.c.forEach(([x,y])=>{
        const ro=gy+y,co=cur.x+x;
        if(ro>=0&&ro<ROWS) cellDraw(gx,co,ro,'ghost');
      });
    }
    cur.c.forEach(([x,y])=>{
      const ro=cur.y+y,co=cur.x+x;
      if(ro>=0) cellDraw(gx,co,ro,'active');
    });
  }

  // next preview
  nx.fillStyle=T.bg; nx.fillRect(0,0,nc.width,nc.height);
  if(nxt){
    const ox=Math.floor((4-nxt.w)/2), oy=Math.floor((4-nxt.h)/2);
    nxt.c.forEach(([x,y])=>{
      const cx=(ox+x)*C+C/2, cy=(oy+y)*C+C/2;
      nx.save(); nx.globalAlpha=0.72; nx.fillStyle=T.fg;
      S.draw(nx,cx,cy,'placed',false);
      nx.restore();
    });
  }
}

// ═══════════════════════════════════════════════════════════
// OVERLAY
// ═══════════════════════════════════════════════════════════
const overlay=document.getElementById('overlay');
function showOv(t,s){document.getElementById('ov-title').textContent=t;document.getElementById('ov-sub').textContent=s;overlay.style.display='flex';}
function hideOv(){overlay.style.display='none';}

// ═══════════════════════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════════════════════
function init(){
  board=Array.from({length:ROWS},()=>new Array(COLS).fill(0));
  score=0;level=1;lines=0;
  gameOver=false;paused=false;started=true;
  dropInterval=800;dropCounter=0;
  clearRows=[];bounceMap={};waitClear=false;
  cur=mkPiece();nxt=mkPiece();
  SoundMgr.play('menu');
  updateHUD();hideOv();
}

function spawn(){
  cur={...nxt,c:nxt.c.map(([x,y])=>[x,y])};
  cur.x=Math.floor((COLS-cur.w)/2);cur.y=0;nxt=mkPiece();
  if(collides(cur,board)){
    gameOver=true;
    SoundMgr.play('gameOver');
    showOv('GAME OVER','SPACE or R to restart');
  }
}

function finalizeClear(){
  const n=removeFull();
  if(n>0){
    const pts=[0,100,300,500,800];
    score+=(pts[Math.min(n,4)])*level;
    lines+=n;
    const oldLevel=level;
    level=Math.floor(lines/10)+1;
    
    // Play line clear or tetris sound
    if(n===4) {
      SoundMgr.play('tetris');
    } else {
      SoundMgr.play('lineClear');
    }
    
    // Play level up if level increased
    if(level>oldLevel) {
      setTimeout(() => SoundMgr.play('levelUp'), 200);
    }
    
    dropInterval=Math.max(80,800-(level-1)*70);
  }
  clearRows=[];waitClear=false;
  updateHUD(n>0);
  spawn();
}

function drop(){
  if(waitClear)return;
  if(!collides(cur,board,0,1)){cur.y++;}
  else{
    lockPiece();
    SoundMgr.play('landed');
    const full=findFull();
    if(full.length>0){
      clearRows=full.map(r=>({row:r,prog:0}));
      waitClear=true;clearTimer=0;
    } else {
      // bounce newly locked cells
      cur.c.forEach(([x,y])=>{
        const r=cur.y+y,c=cur.x+x;
        if(r>=0&&r<ROWS) launchBounce(c,r);
      });
      finalizeClear();
    }
  }
  dropCounter=0;
}

function hardDrop(){
  const gy=ghostRow();
  cur.y=gy;
  drop();
}

// ═══════════════════════════════════════════════════════════
// LOOP
// ═══════════════════════════════════════════════════════════
function loop(ts){
  const dt=Math.min(ts-lastTime,80); lastTime=ts;
  const dtS=dt/1000;

  if(started&&!gameOver&&!paused){
    tickBounce(dtS);
    if(waitClear){
      clearTimer+=dt;
      const prog=Math.min(clearTimer/CLEAR_MS,1);
      clearRows=clearRows.map(cr=>({...cr,prog}));
      if(prog>=1){
        // launch bounce on blocks that will fall down after clear
        const clearSet=new Set(clearRows.map(cr=>cr.row));
        for(let r=0;r<ROWS;r++){
          if(clearSet.has(r))continue;
          for(let c=0;c<COLS;c++){
            if(board[r][c]) launchBounce(c,r);
          }
        }
        finalizeClear();
      }
    } else {
      dropCounter+=dt;
      if(dropCounter>=dropInterval)drop();
    }
  }
  render();
  requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
// APPLY THEME — updates CSS vars + redraws shape previews
// ═══════════════════════════════════════════════════════════
function hexToRgba(h,a){
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function applyTheme(t){
  T=t;
  document.body.style.background=t.bg;
  document.documentElement.style.setProperty('--bg',t.bg);
  document.documentElement.style.setProperty('--fg',t.fg);
  document.documentElement.style.setProperty('--acc',t.fg);
  document.documentElement.style.setProperty('--sub',hexToRgba(t.fg,0.35));
  document.documentElement.style.setProperty('--dim',hexToRgba(t.fg,0.10));
  document.getElementById('ov-title').style.color=t.fg;
  // swatch active state
  document.querySelectorAll('.swatch').forEach(s=>s.classList.toggle('active',s.dataset.id===t.id));
  document.getElementById('ov-sub').style.color=hexToRgba(t.fg,0.38);
  // update panel text
  document.querySelectorAll('.p-val').forEach(el=>el.style.color=t.fg);
  buildShapeGrid();
}

// ═══════════════════════════════════════════════════════════
// BUILD UI
// ═══════════════════════════════════════════════════════════

// — Swatch grid —
const swatchGrid=document.getElementById('swatch-grid');
THEMES.forEach(t=>{
  const el=document.createElement('div');
  el.className='swatch'; el.dataset.id=t.id;
  // SVG diagonal split
  el.innerHTML=`<svg width="100%" height="100%" viewBox="0 0 40 40" preserveAspectRatio="none" style="display:block;border-radius:5px;">
    <polygon points="0,0 40,0 0,40" fill="${t.fg}"/>
    <polygon points="40,0 40,40 0,40" fill="${t.bg}"/>
  </svg>`;
  el.onclick=()=>applyTheme(t);
  swatchGrid.appendChild(el);
});

// — Shape grid —
function buildShapeGrid(){
  const grid=document.getElementById('shape-grid');
  grid.innerHTML='';
  SHAPES.forEach(s=>{
    const wrap=document.createElement('div');
    wrap.className='sh-sw'; wrap.dataset.id=s.id;
    if(s.id===S.id) wrap.classList.add('active');

    const cv=document.createElement('canvas');
    cv.width=40;cv.height=40;
    const ctx=cv.getContext('2d');
    ctx.fillStyle=T.fg;
    ctx.globalAlpha=0.88;
    s.draw(ctx,20,20,'active',false);

    wrap.appendChild(cv);
    wrap.onclick=()=>{
      S=s;
      document.querySelectorAll('.sh-sw').forEach(b=>b.classList.toggle('active',b.dataset.id===s.id));
      buildShapeGrid();
    };
    grid.appendChild(wrap);
  });
}
buildShapeGrid();

// — Popover toggle —
function openPop(id,btnId){
  const isOpen=document.getElementById(id).classList.contains('visible');
  closeAllPops();
  if(!isOpen){
    document.getElementById(id).classList.add('visible');
    document.getElementById(btnId).classList.add('open');
  }
}
function closeAllPops(){
  document.querySelectorAll('.popover').forEach(p=>p.classList.remove('visible'));
  document.querySelectorAll('.tool-btn').forEach(b=>b.classList.remove('open'));
}
document.getElementById('theme-btn').onclick=e=>{e.stopPropagation();openPop('theme-pop','theme-btn');};
document.getElementById('shape-btn').onclick=e=>{e.stopPropagation();openPop('shape-pop','shape-btn');};
document.querySelectorAll('.popover').forEach(p=>p.addEventListener('click',e=>e.stopPropagation()));
document.addEventListener('click',closeAllPops);

// ═══════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  // close popovers on any key
  closeAllPops();

  if(e.code==='Space'){
    e.preventDefault();
    if(!started||gameOver){ init(); return; }
    if(paused){ paused=false; hideOv(); return; }
    if(!waitClear) hardDrop();
    return;
  }
  if(e.code==='KeyR'){ e.preventDefault(); init(); return; }
  if(!started||gameOver)return;
  if(e.code==='KeyP'){
    e.preventDefault(); paused=!paused;
    if(paused) showOv('PAUSED','SPACE or P to resume');
    else hideOv();
    return;
  }
  if(paused||waitClear)return;
  if(e.code==='ArrowLeft') { 
    e.preventDefault(); 
    if(!collides(cur,board,-1,0)){
      cur.x--; 
      SoundMgr.play('move');
    }
  }
  if(e.code==='ArrowRight'){ 
    e.preventDefault(); 
    if(!collides(cur,board, 1,0)){
      cur.x++; 
      SoundMgr.play('move');
    }
  }
  if(e.code==='ArrowDown') { e.preventDefault(); drop(); }
  if(e.code==='ArrowUp')   { 
    e.preventDefault(); 
    const r=rotatePiece(cur); 
    if(!collides(r,board)){
      Object.assign(cur,r); 
      SoundMgr.play('rotate');
    }
  }
});

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
board=Array.from({length:ROWS},()=>new Array(COLS).fill(0));
applyTheme(THEMES[0]);
showOv('TETRIS','SPACE to start');
requestAnimationFrame(loop);
</script>
