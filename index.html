<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TETRIS</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Press Start 2P', monospace;
  user-select: none;
  overflow-x: hidden;
  padding: 16px 0;
}

/* ── THEME BAR ── */
#theme-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 0 0 12px;
  max-width: 760px;
}
.th-btn {
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  padding: 6px 10px;
  border-radius: 2px;
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  letter-spacing: 1px;
  text-transform: uppercase;
  transition: opacity 0.15s, border-color 0.15s;
  opacity: 0.45;
  white-space: nowrap;
}
.th-btn:hover { opacity: 0.85; }
.th-btn.active { opacity: 1; }

/* ── SHAPE BAR ── */
#shape-bar {
  display: flex;
  gap: 8px;
  justify-content: center;
  padding: 0 0 14px;
}
.sh-btn {
  border: 1px solid #2a2a2a;
  background: transparent;
  cursor: pointer;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 2px;
  opacity: 0.4;
  transition: opacity 0.15s, border-color 0.15s;
}
.sh-btn:hover { opacity: 0.8; }
.sh-btn.active { opacity: 1; }

/* ── MAIN LAYOUT ── */
#main {
  display: flex;
  gap: 28px;
  align-items: flex-start;
}
#game-wrap { position: relative; }
canvas { display: block; }

/* ── OVERLAY ── */
#overlay {
  position: absolute;
  top:0; left:0; width:100%; height:100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  background: rgba(0,0,0,0.9);
  z-index: 10;
}
#ov-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  letter-spacing: 4px;
  text-transform: uppercase;
}
#ov-sub {
  font-family: 'Press Start 2P', monospace;
  font-size: 8px;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.6;
}

/* ── PANEL ── */
#panel {
  display: flex;
  flex-direction: column;
  gap: 24px;
  min-width: 110px;
  padding-top: 4px;
}
.p-lbl {
  font-family: 'Press Start 2P', monospace;
  font-size: 7px;
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0.65;
}
.p-val {
  font-family: 'Press Start 2P', monospace;
  font-size: 15px;
  letter-spacing: 1px;
}
.p-keys {
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  letter-spacing: 0px;
  line-height: 2.6;
  text-transform: uppercase;
  opacity: 0.55;
}
</style>
</head>
<body>

<div id="theme-bar"></div>
<div id="shape-bar"></div>

<div id="main">
  <div id="game-wrap">
    <canvas id="game"></canvas>
    <div id="overlay">
      <div id="ov-title">TETRIS</div>
      <div id="ov-sub">PRESS R TO START</div>
    </div>
  </div>

  <div id="panel">
    <div><div class="p-lbl" id="lbl-score">SCORE</div><div class="p-val" id="score-val">0</div></div>
    <div><div class="p-lbl" id="lbl-level">LEVEL</div><div class="p-val" id="level-val">1</div></div>
    <div><div class="p-lbl" id="lbl-lines">LINES</div><div class="p-val" id="lines-val">0</div></div>
    <div><div class="p-lbl" id="lbl-next">NEXT</div><canvas id="next"></canvas></div>
    <div>
      <div class="p-lbl">KEYS</div>
      <div class="p-keys" id="key-hints">
        ← → &nbsp;MOVE<br>
        ↑ &nbsp;&nbsp;&nbsp;ROTATE<br>
        ↓ &nbsp;&nbsp;&nbsp;SOFT<br>
        SPC &nbsp;HARD<br>
        P &nbsp;&nbsp;&nbsp;PAUSE<br>
        R &nbsp;&nbsp;&nbsp;RESET
      </div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// THEMES  — bg, two gameplay colors, text colors
// ═══════════════════════════════════════════════════════
const THEMES = [
  {
    id:'mono', name:'MONO',
    bg:'#000000',
    gridCol:'#ffffff', gridA:0.18,
    placeCol:'#bbbbbb', placeA:1.0,
    actCol:'#ffffff',   actA:1.0,
    ghostCol:'#ffffff', ghostA:0.18,
    // text
    accent:'#ffffff',   // bright values, title
    muted:'#888888',    // labels, keys
  },
  {
    id:'crt', name:'CRT GREEN',
    bg:'#010e01',
    gridCol:'#00ff41', gridA:0.14,
    placeCol:'#00bb30', placeA:1.0,
    actCol:'#00ff41',   actA:1.0,
    ghostCol:'#00ff41', ghostA:0.16,
    accent:'#00ff41',
    muted:'#00bb30',
  },
  {
    id:'amber', name:'AMBER',
    bg:'#0d0800',
    gridCol:'#ffaa00', gridA:0.14,
    placeCol:'#cc6600', placeA:1.0,
    actCol:'#ffcc00',   actA:1.0,
    ghostCol:'#ffaa00', ghostA:0.16,
    accent:'#ffcc00',
    muted:'#cc8800',
  },
  {
    id:'gameboy', name:'GAME BOY',
    bg:'#9bbc0f',
    gridCol:'#0f380f', gridA:0.3,
    placeCol:'#306230', placeA:1.0,
    actCol:'#0f380f',   actA:1.0,
    ghostCol:'#0f380f', ghostA:0.22,
    accent:'#0f380f',
    muted:'#306230',
  },
  {
    id:'neon', name:'NEON BLUE',
    bg:'#00000f',
    gridCol:'#0055ff', gridA:0.16,
    placeCol:'#0066cc', placeA:1.0,
    actCol:'#00bbff',   actA:1.0,
    ghostCol:'#00aaff', ghostA:0.15,
    accent:'#00ddff',
    muted:'#4499cc',
  },
  {
    id:'red', name:'RED ALERT',
    bg:'#0a0000',
    gridCol:'#ff2200', gridA:0.14,
    placeCol:'#aa1100', placeA:1.0,
    actCol:'#ff5533',   actA:1.0,
    ghostCol:'#ff2200', ghostA:0.14,
    accent:'#ff5533',
    muted:'#cc3311',
  },
  {
    id:'purple', name:'PURPLE',
    bg:'#06000d',
    gridCol:'#cc44ff', gridA:0.14,
    placeCol:'#8822bb', placeA:1.0,
    actCol:'#ee77ff',   actA:1.0,
    ghostCol:'#cc44ff', ghostA:0.15,
    accent:'#ee77ff',
    muted:'#aa44cc',
  },
  {
    id:'ice', name:'ICE',
    bg:'#000a12',
    gridCol:'#88ddff', gridA:0.16,
    placeCol:'#3399bb', placeA:1.0,
    actCol:'#aaeeff',   actA:1.0,
    ghostCol:'#88ddff', ghostA:0.15,
    accent:'#aaeeff',
    muted:'#5599bb',
  },
];

// ═══════════════════════════════════════════════════════
// CELL SHAPES
// ═══════════════════════════════════════════════════════
const CELL = 30;

const SHAPE_DEFS = [
  {
    id:'circle', sym:'●',
    draw(ctx, cx, cy, type) {
      const r = type==='grid'?2 : type==='placed'?9 : type==='active'?11 : 8;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
    }
  },
  {
    id:'square', sym:'■',
    draw(ctx, cx, cy, type) {
      const s = type==='grid'?4 : type==='placed'?18 : type==='active'?22 : 16;
      ctx.fillRect(cx-s/2, cy-s/2, s, s);
    }
  },
  {
    id:'rounded', sym:'▣',
    draw(ctx, cx, cy, type) {
      const s = type==='grid'?4 : type==='placed'?17 : type==='active'?21 : 15;
      const r = type==='grid'?1 : 5;
      ctx.beginPath(); ctx.roundRect(cx-s/2, cy-s/2, s, s, r); ctx.fill();
    }
  },
  {
    id:'diamond', sym:'◆',
    draw(ctx, cx, cy, type) {
      const rw = type==='grid'?2.5 : type==='placed'?8  : type==='active'?10 : 7.5;
      const rh = type==='grid'?3.5 : type==='placed'?11 : type==='active'?14 : 10;
      ctx.beginPath();
      ctx.moveTo(cx,cy-rh); ctx.lineTo(cx+rw,cy);
      ctx.lineTo(cx,cy+rh); ctx.lineTo(cx-rw,cy);
      ctx.closePath(); ctx.fill();
    }
  },
  {
    id:'cross', sym:'✛',
    draw(ctx, cx, cy, type) {
      const arm = type==='grid'?2.5 : type==='placed'?9 : type==='active'?11 : 8;
      const thk = type==='grid'?1.5 : type==='placed'?5 : type==='active'?6  : 4.5;
      ctx.fillRect(cx-arm, cy-thk/2, arm*2, thk);
      ctx.fillRect(cx-thk/2, cy-arm, thk, arm*2);
    }
  },
  {
    id:'hex', sym:'⬡',
    draw(ctx, cx, cy, type) {
      const r = type==='grid'?2.5 : type==='placed'?9 : type==='active'?11 : 8;
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=Math.PI/180*(60*i-30);
        i===0?ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a))
             :ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
      }
      ctx.closePath(); ctx.fill();
    }
  },
];

// ═══════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════
const COLS=10, ROWS=20;
const gc=document.getElementById('game'), gx=gc.getContext('2d');
gc.width=COLS*CELL; gc.height=ROWS*CELL;
const nc=document.getElementById('next'), nx=nc.getContext('2d');
nc.width=4*CELL; nc.height=4*CELL;

// ═══════════════════════════════════════════════════════
// PIECES
// ═══════════════════════════════════════════════════════
const PIECES=[
  {c:[[0,1],[1,1],[2,1],[3,1]],w:4,h:3},
  {c:[[0,0],[1,0],[0,1],[1,1]],w:2,h:2},
  {c:[[1,0],[0,1],[1,1],[2,1]],w:3,h:2},
  {c:[[2,0],[0,1],[1,1],[2,1]],w:3,h:2},
  {c:[[0,0],[0,1],[1,1],[2,1]],w:3,h:2},
  {c:[[1,0],[2,0],[0,1],[1,1]],w:3,h:2},
  {c:[[0,0],[1,0],[1,1],[2,1]],w:3,h:2},
];

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let board,cur,nxt;
let score=0,level=1,lines=0;
let gameOver=false,paused=false,started=false;
let dropCounter=0,dropInterval=800,lastTime=0;
let curTheme=THEMES[0], curShape=SHAPE_DEFS[0];

function mkPiece(){
  const s=PIECES[Math.floor(Math.random()*PIECES.length)];
  return{c:s.c.map(([x,y])=>[x,y]),w:s.w,h:s.h,x:Math.floor((COLS-s.w)/2),y:0};
}
function collides(p,brd,dx=0,dy=0){
  for(const[x,y]of p.c){const nx2=p.x+x+dx,ny=p.y+y+dy;if(nx2<0||nx2>=COLS||ny>=ROWS)return true;if(ny>=0&&brd[ny][nx2])return true;}return false;
}
function rotatePiece(p){
  const nc2=p.c.map(([x,y])=>[p.h-1-y,x]),nw=p.h,nh=p.w;let nx2=p.x;
  const maxX=Math.max(...nc2.map(([x])=>x)),minX=Math.min(...nc2.map(([x])=>x));
  if(nx2+maxX>=COLS)nx2=COLS-1-maxX;if(nx2+minX<0)nx2=-minX;
  return{c:nc2,w:nw,h:nh,x:nx2,y:p.y};
}
function lockPiece(){cur.c.forEach(([x,y])=>{const r=cur.y+y,c=cur.x+x;if(r>=0)board[r][c]=1;});}
function clearLines(){let n=0;for(let r=ROWS-1;r>=0;r--){if(board[r].every(v=>v)){board.splice(r,1);board.unshift(new Array(COLS).fill(0));n++;r++;}}return n;}
function ghostRow(){let gy=cur.y;while(!collides(cur,board,0,gy-cur.y+1))gy++;return gy;}
function updateHUD(){
  document.getElementById('score-val').textContent=score;
  document.getElementById('level-val').textContent=level;
  document.getElementById('lines-val').textContent=lines;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function drawCell(ctx,col,row,type){
  const t=curTheme,cx=col*CELL+CELL/2,cy=row*CELL+CELL/2;
  let color,alpha;
  if(type==='grid')  {color=t.gridCol; alpha=t.gridA;}
  else if(type==='placed'){color=t.placeCol;alpha=t.placeA;}
  else if(type==='active'){color=t.actCol;  alpha=t.actA;}
  else               {color=t.ghostCol;alpha=t.ghostA;}
  ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;
  curShape.draw(ctx,cx,cy,type);
  ctx.restore();
}

function render(){
  const t=curTheme;
  gx.fillStyle=t.bg; gx.fillRect(0,0,gc.width,gc.height);
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)drawCell(gx,c,r,board[r][c]?'placed':'grid');
  if(started&&!gameOver&&cur){
    const gy=ghostRow();
    if(gy!==cur.y)cur.c.forEach(([x,y])=>{const row=gy+y,col=cur.x+x;if(row>=0&&row<ROWS)drawCell(gx,col,row,'ghost');});
    cur.c.forEach(([x,y])=>{const row=cur.y+y,col=cur.x+x;if(row>=0)drawCell(gx,col,row,'active');});
  }
  nx.fillStyle=t.bg; nx.fillRect(0,0,nc.width,nc.height);
  if(nxt){
    const ox=Math.floor((4-nxt.w)/2),oy=Math.floor((4-nxt.h)/2);
    nxt.c.forEach(([x,y])=>{
      const cx=(ox+x)*CELL+CELL/2,cy=(oy+y)*CELL+CELL/2;
      nx.save();nx.globalAlpha=t.placeA*0.85;nx.fillStyle=t.placeCol;
      curShape.draw(nx,cx,cy,'placed');nx.restore();
    });
  }
}

// ═══════════════════════════════════════════════════════
// OVERLAY
// ═══════════════════════════════════════════════════════
const overlay=document.getElementById('overlay');
function showOverlay(big,small){
  document.getElementById('ov-title').textContent=big;
  document.getElementById('ov-sub').textContent=small;
  overlay.style.display='flex';
}
function hideOverlay(){overlay.style.display='none';}

// ═══════════════════════════════════════════════════════
// GAME FLOW
// ═══════════════════════════════════════════════════════
function init(){
  board=Array.from({length:ROWS},()=>new Array(COLS).fill(0));
  score=0;level=1;lines=0;gameOver=false;paused=false;started=true;
  dropInterval=800;dropCounter=0;cur=mkPiece();nxt=mkPiece();
  updateHUD();hideOverlay();
}
function spawn(){
  cur={...nxt,c:nxt.c.map(([x,y])=>[x,y])};
  cur.x=Math.floor((COLS-cur.w)/2);cur.y=0;nxt=mkPiece();
  if(collides(cur,board)){gameOver=true;showOverlay('GAME OVER','PRESS R TO RESTART');}
}
function drop(){
  if(!collides(cur,board,0,1)){cur.y++;}
  else{
    lockPiece();const n=clearLines();
    if(n>0){const pts=[0,100,300,500,800];score+=(pts[Math.min(n,4)]||800)*level;lines+=n;level=Math.floor(lines/10)+1;dropInterval=Math.max(80,800-(level-1)*70);}
    updateHUD();spawn();
  }
  dropCounter=0;
}
function hardDrop(){cur.y=ghostRow();drop();}

function loop(ts){
  const dt=ts-lastTime;lastTime=ts;
  if(started&&!gameOver&&!paused){dropCounter+=dt;if(dropCounter>=dropInterval)drop();}
  render();requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════
// APPLY THEME — syncs all CSS text colors
// ═══════════════════════════════════════════════════════
function applyTheme(t){
  curTheme=t;
  document.body.style.background=t.bg;

  // overlay
  document.getElementById('ov-title').style.color=t.accent;
  document.getElementById('ov-sub').style.color=t.muted;

  // panel values (bright)
  ['score-val','level-val','lines-val'].forEach(id=>{
    document.getElementById(id).style.color=t.accent;
  });
  // panel labels (muted)
  ['lbl-score','lbl-level','lbl-lines','lbl-next'].forEach(id=>{
    document.getElementById(id).style.color=t.muted;
  });
  document.getElementById('key-hints').style.color=t.muted;

  // theme buttons
  document.querySelectorAll('.th-btn').forEach(b=>{
    const active=b.dataset.id===t.id;
    b.style.color=active?t.accent:t.muted;
    b.style.borderColor=active?t.accent:'transparent';
    b.classList.toggle('active',active);
    b.style.opacity=active?'1':'0.5';
  });

  // shape buttons
  document.querySelectorAll('.sh-btn').forEach(b=>{
    const active=b.dataset.id===curShape.id;
    b.style.borderColor=active?t.accent:'#2a2a2a';
    b.style.opacity=active?'1':'0.4';
    // redraw mini preview with theme color
    const cv=b.querySelector('canvas');
    if(cv){
      const ctx=cv.getContext('2d');
      ctx.clearRect(0,0,cv.width,cv.height);
      ctx.fillStyle=active?t.accent:t.muted;
      ctx.globalAlpha=1;
      SHAPE_DEFS.find(s=>s.id===b.dataset.id).draw(ctx,cv.width/2,cv.height/2,'active');
    }
  });
}

// ═══════════════════════════════════════════════════════
// BUILD CONTROLS
// ═══════════════════════════════════════════════════════
const thBar=document.getElementById('theme-bar');
THEMES.forEach(t=>{
  const b=document.createElement('button');
  b.className='th-btn'; b.dataset.id=t.id;
  b.textContent=t.name;
  b.onclick=()=>applyTheme(t);
  thBar.appendChild(b);
});

const shBar=document.getElementById('shape-bar');
SHAPE_DEFS.forEach(s=>{
  const wrap=document.createElement('div');
  wrap.className='sh-btn'; wrap.dataset.id=s.id;
  const cv=document.createElement('canvas');
  cv.width=22;cv.height=22;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#aaa';ctx.globalAlpha=1;
  s.draw(ctx,11,11,'active');
  wrap.appendChild(cv);
  wrap.onclick=()=>{
    curShape=s;
    applyTheme(curTheme); // redraws shape buttons with correct colors
  };
  shBar.appendChild(wrap);
});

// ═══════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.code==='KeyR'){e.preventDefault();init();return;}
  if(!started||gameOver)return;
  if(e.code==='KeyP'){e.preventDefault();paused=!paused;if(paused)showOverlay('PAUSED','PRESS P TO RESUME');else hideOverlay();return;}
  if(paused)return;
  if(e.code==='ArrowLeft') {e.preventDefault();if(!collides(cur,board,-1,0))cur.x--;}
  if(e.code==='ArrowRight'){e.preventDefault();if(!collides(cur,board, 1,0))cur.x++;}
  if(e.code==='ArrowDown') {e.preventDefault();drop();}
  if(e.code==='ArrowUp')   {e.preventDefault();const r=rotatePiece(cur);if(!collides(r,board))Object.assign(cur,r);}
  if(e.code==='Space')     {e.preventDefault();hardDrop();}
});

// ═══════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════
board=Array.from({length:ROWS},()=>new Array(COLS).fill(0));
applyTheme(THEMES[0]);
document.querySelector('.sh-btn').classList.add('active');
requestAnimationFrame(loop);
</script>
</body>
</html>
